name: Update Profile README

on:
  push:
    branches: [main]

jobs:
  update-profile:
    runs-on: ubuntu-latest
    # Only run when problem folders are changed (not workflow-only edits)
    steps:
      - name: Checkout LeetCode repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Profile README
        env:
          PROFILE_README_TOKEN: ${{ secrets.PROFILE_README_TOKEN }}
        run: python scripts/update_profile_readme.py
