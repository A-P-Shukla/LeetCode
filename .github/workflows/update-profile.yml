name: Update Profile README

on:
  push:
    branches:
      - main  # Confirm if your default branch is main or master

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest commit message
        id: commit
        run: |
          # Captures the subject line of the last commit
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Checkout Profile Repo
        uses: actions/checkout@v4
        with:
          repository: A-P-Shukla/A-P-Shukla
          token: ${{ secrets.PROFILE_UPDATE_TOKEN }}
          path: profile-repo

      - name: Update README content
        run: |
          cd profile-repo
          COMMIT_MSG="${{ steps.commit.outputs.msg }}"
          
          # This awk script replaces everything between the markers
          awk -v msg="$COMMIT_MSG" '
          // {
            print $0
            print "#### 🧩 Latest LeetCode Solve"
            print "> `" msg "`"
            skip=1
          }
          // {
            skip=0
          }
          !skip' README.md > README.tmp && mv README.tmp README.md

      - name: Commit and Push
        run: |
          cd profile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync latest LeetCode activity" || exit 0
          git push
